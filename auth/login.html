<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Rising Grace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Correct CSS Path -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">

<header class="navbar">
    <div class="logo">Rising Grace</div>
    <nav>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../about/about.html">About</a></li>
            <li><a href="../contact/contact.html">Contact</a></li>
            <li><a href="login.html" class="login-btn active">Login</a></li>
        </ul>
    </nav>
</header>

<section class="auth-container">
    <div class="auth-card fade-in">

        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue your journey.</p>

        <form id="loginForm">

            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>

            <button type="submit" id="loginBtn" disabled>Login</button>

        </form>

        <div class="auth-footer">
            <p>Don't have an account?</p>
            <a href="register.html" class="register-link">Create Account</a>
        </div>

    </div>
</section>

<!-- Correct JS Path -->
<script src="../js/script.js"></script>

</body>
</html>
