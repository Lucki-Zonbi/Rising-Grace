<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Rising Grace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">

<header class="navbar">
    <div class="logo">Rising Grace</div>
    <nav>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../about/about.html">About</a></li>
            <li><a href="../contact/contact.html">Contact</a></li>
            <li><a href="login.html" class="login-btn active">Login</a></li>
        </ul>
    </nav>
</header>

<section class="auth-container">
    <div class="auth-card fade-in">

        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue your journey.</p>

        <form id="loginForm">

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>Password</label>

                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <span id="togglePassword">👁️</span>
                </div>

                <!-- Strength Bar -->
                <div class="strength-container">
                    <div id="strengthBar"></div>
                </div>

                <small id="strengthText"></small>
            </div>

            <!-- BUTTON -->
            <button type="submit" id="loginBtn" disabled>Login</button>

        </form>

        <div class="auth-footer">
            <p>Don't have an account?</p>
            <a href="register.html">Create Account</a>
        </div>

    </div>
</section>

<script src="../js/ariez.js"></script>
<script src="../js/api.js"></script>
<script src="../js/script.js"></script>

</body>
</html>
