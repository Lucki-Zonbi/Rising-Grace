<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Rising Grace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="contact-body">

<!-- ===================== NAVIGATION ===================== -->
<header class="navbar">
    <div class="logo">Rising Grace</div>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../about/about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="../auth/login.html" class="login-btn">Login</a>
    </nav>
</header>

<!-- ===================== CONTACT SECTION ===================== -->
<main class="contact-container">

    <h1 class="contact-title">Connect With Rising Grace</h1>

    <!-- ===================== FORM ===================== -->
    <form id="contactForm">

        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="name" placeholder="e.g., Jordan Williams"
            required>
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="e.g., jordan.williams@email.com" required>
        </div>

        <div class="form-group">
            <label>Phone *</label>
            <input type="tel" id="phone" placeholder="e.g., (412) 555-7890"
            required>
        </div>

        <div class="form-group">
            <label>Preferred Contact Method *</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="contactMethod" value="Email" required>
                    Email
                </label>
                <label>
                    <input type="radio" name="contactMethod" value="Phone">
                    Phone
                </label>
                <label>
                    <input type="radio" name="contactMethod" value="Text">
                    Text
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Subject *</label>
            <input type="text" id="subject" required>
        </div>

        <div class="form-group">
            <label>Message *</label>
            <textarea id="message" rows="5" required></textarea>
        </div>

        <!-- ===================== BUTTONS ===================== -->
        <div class="button-group">
            <button type="submit" id="sendBtn" class="submit-btn" disabled>
                Send Message
            </button>

            <button type="button" id="cancelBtn" class="cancel-btn">
                Cancel
            </button>
        </div>

    </form>

    <!-- ===================== SUCCESS MESSAGE ===================== -->
    <div id="successMessage" class="success-box hidden">
        <h2>Your Message Has Been Sent 🌸</h2>
        <p id="verificationNotice"></p>

        <button onclick="window.location.href='../index.html'" class="submit-btn">
            Return Home
        </button>
    </div>

</main>

<!-- Main JS -->
<script src="../js/script.js"></script>

</body>
</html>
