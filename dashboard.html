<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Rising Grace – Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body onload="checkAuth(); loadDashboard(); loadSecurityEvents(); startAriezMonitor();">

 <div id="ariezAlertBanner" class="ariez-banner hidden">
⚠ ARIEZ SECURITY ALERT DETECTED
</div>

<h1 class="dashboard-title">Rising Grace Security Dashboard</h1>

<div class="dashboard-container">

  <div class="dashboard-card">
    <h2>User Profile</h2>
    <div id="userInfo">
      Loading user information...
    </div>
  </div>

  <div class="dashboard-card">
    <h2>Account Features</h2>
    <div id="roleFeatures">
      Loading features...
    </div>
  </div>

  <div class="dashboard-card">
    <h2>Ariez Security Monitor</h2>
    <div id="securityEvents">
      Loading security activity...
    </div>
  </div>

  <div class="dashboard-card">
  <h2>Your Readiness</h2>
  <p>Score: <span id="readinessScore">--</span></p>
  <p>Status: <span id="readinessLevel">--</span></p>
</div>

</div>

<div class="card preview-card">
    <h3>Admin Preview Mode</h3>

    <div class="preview-grid">
        <button onclick="previewPage('../index.html')">Home</button>
        <button onclick="previewPage('../about/about.html')">About</button>
        <button onclick="previewPage('../contact/contact.html')">Contact</button>
        <button onclick="previewPage('../auth/register.html')">Register</button>
        <button onclick="previewPage('../questionnaire.html')">Questionnaire</button>
        <button onclick="previewPage('../schedule.html')">Schedule</button>
    </div>

    <div><button class="full-flow-btn" onclick="startFullPreview()">Full User Flow</button>
    </div>

</div>

<div class="card">
    <h3>Create Admin</h3>

    <input id="adminName" placeholder="Name">
    <input id="adminEmail" placeholder="Email">
    <input id="adminPassword" placeholder="Password">

    <button onclick="createAdmin()">Create Admin</button>
</div>

<button id="logoutBtn">Logout</button>

<script src="js/ariez.js"></script>
<script src="js/authGuard.js"></script>
<script src="js/script.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
