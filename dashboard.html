<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Rising Grace – Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body onload="checkAuth(); loadDashboard(); loadSecurityEvents();">

<h1 class="dashboard-title">Rising Grace Security Dashboard</h1>

<div class="dashboard-container">

  <div class="dashboard-card">
    <h2>User Profile</h2>
    <div id="userInfo">
      Loading user information...
    </div>
  </div>

  <div class="dashboard-card">
    <h2>Account Features</h2>
    <div id="roleFeatures">
      Loading features...
    </div>
  </div>

  <div class="dashboard-card">
    <h2>Ariez Security Monitor</h2>
    <div id="securityEvents">
      Loading security activity...
    </div>
  </div>

</div>

<button id="logoutBtn">Logout</button>

<script src="js/ariez.js"></script>
<script src="js/authGuard.js"></script>
<script src="js/script.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
